name: DD怪科技自动化运行

on:
  workflow_dispatch: # 手动触发

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
    - name: 1. 获取最新代码
      uses: actions/checkout@v3

    - name: 2. 设置 Python 环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 3. 安装所需依赖
      run: |
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install pyyaml requests pycryptodome 

    - name: 4. 更新 config.yml（使用已有配置，不传参）
      run: |
        python -c "
        import os
        import yaml

        config_path = 'config.yml'
        if os.path.exists(config_path):
            with open(config_path, 'r', encoding='utf-8') as f:
                config = yaml.safe_load(f) or {}
            print('已加载现有 config.yml')
        else:
            config = {}
            print('未找到 config.yml，初始化新配置')

        # 如果需要，这里可以在 config 里锁定 deviceId 或默认经纬度
        users = config.get('users') or []
        for user in users:
            user.setdefault('deviceId', 'B165F069-7E39-7B5B-2DA5-07B0EC4BFBF8')
            user.setdefault('address', '未知地址')
            user.setdefault('lon', 0.0)
            user.setdefault('lat', 0.0)

        config['users'] = users

        with open(config_path, 'w', encoding='utf-8') as f:
            yaml.dump(config, f, allow_unicode=True, sort_keys=False)
        print('✅ 配置更新完成')
        "

    - name: 5. 运行核心打卡脚本
      run: python index.py
